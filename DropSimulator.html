<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Valley — Equipment Drop Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0f0; font-size: 13px; }

/* Layout */
.app { display: grid; grid-template-columns: 300px 1fr 260px; gap: 0; height: 100vh; overflow: hidden; }
.panel { padding: 14px; overflow-y: auto; }
.panel-left  { background: #16162a; border-right: 1px solid #2a2a44; }
.panel-mid   { background: #0f0f1a; }
.panel-right { background: #16162a; border-left: 1px solid #2a2a44; }

/* Header */
.app-title { font-size: 15px; font-weight: 800; color: #a78bfa; margin-bottom: 14px; letter-spacing: 0.05em; }
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 8px; margin-top: 14px; }

/* Chapter control */
.ch-control { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ch-label { font-size: 13px; font-weight: 700; color: #e0e0f0; }
.ch-val { font-size: 20px; font-weight: 800; color: #a78bfa; min-width: 30px; text-align: center; }
.btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.15s; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-purple { background: #7c3aed; color: #fff; }
.btn-purple:hover { background: #6d28d9; }
.btn-green { background: #059669; color: #fff; }
.btn-green:hover { background: #047857; }
.btn-gray { background: #374151; color: #d1d5db; }
.btn-gray:hover { background: #4b5563; }
.btn-red { background: #dc2626; color: #fff; }
.btn-red:hover { background: #b91c1c; }
.btn-orange { background: #d97706; color: #fff; }
.btn-orange:hover { background: #b45309; }
input[type=range] { width: 100%; accent-color: #7c3aed; }

/* Chapter info */
.ch-info { background: #1e1e36; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
.ch-stat { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 11px; }
.ch-stat span:last-child { color: #a78bfa; font-weight: 700; }

/* Rarity colors */
.r-common    { color: #d1d5db; }
.r-uncommon  { color: #34d399; }
.r-rare      { color: #60a5fa; }
.r-epic      { color: #c084fc; }
.r-legendary { color: #fb923c; }
.bg-common    { background: #374151; }
.bg-uncommon  { background: #064e3b; border: 1px solid #34d399; }
.bg-rare      { background: #1e3a5f; border: 1px solid #60a5fa; }
.bg-epic      { background: #3b1d6b; border: 1px solid #c084fc; }
.bg-legendary { background: #7c2d12; border: 1px solid #fb923c; }

/* Gear slots */
.gear-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.gear-slot { border-radius: 7px; padding: 7px 9px; min-height: 62px; position: relative; }
.gear-slot-name { font-size: 10px; color: #9ca3af; margin-bottom: 2px; }
.gear-item-name { font-size: 12px; font-weight: 700; margin-bottom: 1px; }
.gear-score { font-size: 10px; color: #9ca3af; }
.gear-empty { color: #4b5563; font-size: 11px; font-style: italic; }
.gear-rarity-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-bottom: 3px; }

/* Boss button */
.boss-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; cursor: pointer; font-size: 16px; font-weight: 800; background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; margin-bottom: 10px; transition: all 0.2s; letter-spacing: 0.05em; }
.boss-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
.boss-btn:active { transform: translateY(0); }
.boss-btn.disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Drop history */
.drop-list { display: flex; flex-direction: column; gap: 5px; }
.drop-card { border-radius: 7px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
.drop-card-info { flex: 1; }
.drop-card-name { font-size: 12px; font-weight: 700; }
.drop-card-sub { font-size: 10px; color: #9ca3af; }
.drop-card-score { font-size: 12px; font-weight: 700; text-align: right; min-width: 50px; }
.drop-badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.badge-upgrade { background: #065f46; color: #34d399; }
.badge-sell { background: #374151; color: #9ca3af; }
.badge-new { background: #1e3a5f; color: #60a5fa; }

/* Stats */
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #2a2a44; font-size: 11px; }
.stat-row:last-child { border-bottom: none; }
.stat-val { font-weight: 700; color: #a78bfa; }
.rarity-bar { display: flex; height: 14px; border-radius: 4px; overflow: hidden; margin-top: 4px; }
.rarity-seg { display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; transition: width 0.3s; }

/* Prob editor */
.prob-editor { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.prob-field { display: flex; flex-direction: column; gap: 2px; }
.prob-field label { font-size: 10px; }
.prob-field input[type=number] { background: #1e1e36; border: 1px solid #374151; color: #e0e0f0; border-radius: 5px; padding: 4px 7px; font-size: 12px; width: 100%; }

/* Chapter wave visual */
.wave-visual { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 6px; }
.wave-dot { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #fff; font-weight: 700; }
.wave-normal { background: #374151; }
.wave-boss { background: #7c3aed; }
.wave-boss-final { background: #f59e0b; }
.wave-done { opacity: 0.35; }
.wave-current { ring: 2px; box-shadow: 0 0 0 2px #a78bfa; }

/* Pity display */
.pity-bar { height: 6px; background: #2a2a44; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.pity-fill { height: 100%; background: #f59e0b; border-radius: 3px; transition: width 0.3s; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

/* Log item fade */
@keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
.new-drop { animation: slideIn 0.25s ease; }

/* Tabs */
.tab-row { display: flex; gap: 4px; margin-bottom: 10px; }
.tab { padding: 4px 10px; border-radius: 5px; border: 1px solid #374151; cursor: pointer; font-size: 11px; font-weight: 600; color: #9ca3af; }
.tab.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }

.sim-count { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.sim-count input { background: #1e1e36; border: 1px solid #374151; color: #e0e0f0; border-radius: 5px; padding: 4px 8px; width: 70px; font-size: 12px; }
</style>
</head>
<body>
<div class="app">

<!-- LEFT: Controls + Gear -->
<div class="panel panel-left">
  <div class="app-title">⚔️ NATV Drop Simulator</div>

  <div class="section-label">Chapter</div>
  <div class="ch-control">
    <button class="btn btn-gray btn-sm" onclick="chChange(-1)">◀</button>
    <span class="ch-val" id="chVal">1</span>
    <button class="btn btn-gray btn-sm" onclick="chChange(1)">▶</button>
    <input type="range" id="chSlider" min="1" max="24" value="1" oninput="chSet(this.value)">
  </div>

  <div class="ch-info" id="chInfo"></div>

  <!-- Wave progress -->
  <div class="section-label">Wave Progress</div>
  <div class="wave-visual" id="waveVis"></div>

  <!-- Pity -->
  <div class="section-label">Pity <span id="pityTxt" style="color:#f59e0b;font-weight:700"></span></div>
  <div class="pity-bar"><div class="pity-fill" id="pityFill" style="width:0%"></div></div>

  <div style="margin-top:14px">
    <button class="boss-btn" id="mobBtn" onclick="doMobDrop()" style="background:linear-gradient(135deg,#1e3a2f,#14532d);margin-bottom:6px">⚔️ MOB WAVE 1–3</button>
    <button class="boss-btn" id="bossBtn" onclick="doBoss()">👹 BOSS WAVE 5</button>
    <div style="display:flex;gap:6px">
      <button class="btn btn-gray btn-sm" style="flex:1" onclick="runAll()">▶▶ Chạy hết chapter</button>
      <button class="btn btn-red btn-sm" onclick="resetChapter()">↺ Reset Ch</button>
      <button class="btn btn-red btn-sm" onclick="resetAll()">↺ All</button>
    </div>
  </div>

  <!-- Gear -->
  <div class="section-label">Trang Bị Hiện Tại</div>
  <div class="gear-grid" id="gearGrid"></div>
</div>

<!-- MID: Drop log -->
<div class="panel panel-mid">
  <div class="tab-row">
    <div class="tab active" onclick="setTab('log',this)">📜 Drop Log</div>
    <div class="tab" onclick="setTab('stats',this)">📊 Thống Kê</div>
    <div class="tab" onclick="setTab('rarity',this)">📋 Rarity List</div>
    <div class="tab" onclick="setTab('prob',this)">🎲 Xác Suất</div>
  </div>

  <!-- Log tab -->
  <div id="tab-log">
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <button class="btn btn-gray btn-sm" onclick="clearLog()">Xóa log</button>
      <span id="logCount" style="color:#6b7280;font-size:11px"></span>
    </div>
    <div class="drop-list" id="dropList"></div>
  </div>

  <!-- Stats tab -->
  <div id="tab-stats" style="display:none">
    <div class="sim-count">
      <span style="font-size:11px;color:#9ca3af">Auto simulate:</span>
      <input type="number" id="simCount" value="100" min="1" max="9999">
      <button class="btn btn-green btn-sm" onclick="bulkSim()">▶ Chạy</button>
    </div>
    <div id="statsContent"></div>
  </div>

  <!-- Rarity List tab -->
  <div id="tab-rarity" style="display:none">
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <select id="raritySlotFilter" onchange="renderRarityList()" style="background:#1e1e36;border:1px solid #374151;color:#e0e0f0;border-radius:5px;padding:4px 8px;font-size:11px;flex:1">
        <option value="all">Tất cả slot</option>
      </select>
      <select id="rarityFilter" onchange="renderRarityList()" style="background:#1e1e36;border:1px solid #374151;color:#e0e0f0;border-radius:5px;padding:4px 8px;font-size:11px;flex:1">
        <option value="all">Tất cả rarity</option>
        <option value="Common">⬜ Common</option>
        <option value="Uncommon">🟩 Uncommon</option>
        <option value="Rare">🟦 Rare</option>
        <option value="Epic">🟪 Epic</option>
        <option value="Legendary">🟧 Legendary</option>
      </select>
    </div>
    <div id="rarityListContent"></div>
  </div>

  <!-- Prob editor tab -->
  <div id="tab-prob" style="display:none">
    <div class="section-label">Xác Suất Boss Thường (tổng = 100%) — Boss cuối chapter: guaranteed Uncommon+ (Ch1–8) / Rare+ (Ch9–24)</div>
    <div id="probEditor"></div>
    <button class="btn btn-purple btn-sm" style="margin-top:8px;width:100%" onclick="applyProb()">✓ Áp dụng</button>
    <button class="btn btn-gray btn-sm" style="margin-top:4px;width:100%" onclick="resetProb()">↺ Về mặc định</button>
    <div id="probErr" style="color:#f87171;font-size:11px;margin-top:4px"></div>
  </div>
</div>

<!-- RIGHT: Item DB -->
<div class="panel panel-right">
  <div class="section-label">Item Database</div>
  <div style="margin-bottom:8px">
    <select id="slotFilter" onchange="renderItemDB()" style="background:#1e1e36;border:1px solid #374151;color:#e0e0f0;border-radius:5px;padding:4px 8px;font-size:11px;width:100%">
      <option value="all">Tất cả slot</option>
    </select>
  </div>
  <div id="itemDB"></div>
</div>



</div>

// Build item pool: 66 items per slot, score từ CSV_SCORES
// chapter(i) = floor(i × 24 / 66) + 1
function buildPool(slotId) {
  const mats = MATERIALS[slotId];
  const poolSize = mats.length; // 66
  const scores = CSV_SCORES[slotId];
  const chStart = {};
  for (let i = 0; i < poolSize; i++) {
    const ch = Math.floor(i * 24 / poolSize) + 1;
    if (chStart[ch] === undefined) chStart[ch] = i;
  }
  return Array.from({length: poolSize}, (_, i) => {
    const ch = Math.floor(i * 24 / poolSize) + 1;
    const sc = scores[i] || {};
    return {
      idx:       i,
      id:        `${slotId}_${String(i).padStart(2,'0')}`,
      name:      mats[i],
      chapter:   ch,
      baseScore: sc['Common'] || 0,
      scoresMap: sc,
    };
  });
}

const ITEM_POOLS = {};
SLOTS.forEach(sl => { ITEM_POOLS[sl.id] = buildPool(sl.id); });

// chapter → item list lookup
const CH_ITEMS = {};
SLOTS.forEach(sl => {
  CH_ITEMS[sl.id] = {};
  for (let ch = 1; ch <= 24; ch++)
    CH_ITEMS[sl.id][ch] = ITEM_POOLS[sl.id].filter(it => it.chapter === ch);
});

function pickItem(slotId, ch) {
  let pool = CH_ITEMS[slotId][ch];
  if (!pool || !pool.length) {
    // fallback: nearest lower chapter
    for (let c = ch-1; c >= 1; c--) {
      pool = CH_ITEMS[slotId][c];
      if (pool && pool.length) break;
    }
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

// Default rarity probabilities per chapter group [C,U,R,E,L]
// Group 0 → Ch1–2  : không có Rare
// Group 1 → Ch3–5  : Rare bắt đầu (Ch3 trở đi)
// Group 2 → Ch6–8  : Rare phổ biến hơn
// Group 3 → Ch9–11 : Legendary bắt đầu
// Groups 4–7: tăng dần Epic/Legendary
// Common tối đa Ch5, Ch6+ = 0% Common
const DEFAULT_PROB = [
  [70, 30,  0,  0, 0], // Ch 1-3
  [55, 38,  7,  0, 0], // Ch 4-6  : Rare bắt đầu
  [40, 42, 18,  0, 0], // Ch 7-9
  [25, 45, 28,  2, 0], // Ch10-12
  [10, 48, 34,  7, 1], // Ch13-15 : Epic bắt đầu
  [ 0, 38, 42, 16, 4], // Ch16-18
  [ 0, 25, 44, 24, 7], // Ch19-21
  [ 0, 12, 44, 32,12], // Ch22-24
];

// Prob group index for a chapter (0–7)
// Group 0 = Ch1-3, Group 1 = Ch4-6, Group 2 = Ch7-9, ..., Group 7 = Ch22-24
function probGroup(ch) {
  if (ch <= 3) return 0;
  return Math.min(1 + Math.floor((ch - 4) / 3), 7);
}

// Hard cap rarity per chapter range
// Ch 1–6: max Uncommon | Ch 7–12: max Rare | Ch 13–18: max Epic | Ch 19–24: max Legendary
function rarityHardCap(ch) {
  if (ch <= 6)  return 1; // Uncommon
  if (ch <= 12) return 2; // Rare
  if (ch <= 18) return 3; // Epic
  return 4;               // Legendary
}
function capRarity(rarity, ch) {
  const cap = rarityHardCap(ch);
  return RARITIES.indexOf(rarity) > cap ? RARITIES[cap] : rarity;
}

// Item score from item object
function calcScore(item, rarity) { return item.scoresMap ? (item.scoresMap[rarity] || 0) : item.baseScore * SCORE_MULT[rarity]; }

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let state = {
  chapter: 1,
  bossIdx: 0,       // 0-indexed boss within chapter
  gear: {},         // slotId → {name, rarity, score, chapter}
  pityCount: 0,     // consecutive bosses without upgrade
  mobDropDone: false, // mob drop (wave 1-3) done for current boss cycle
  log: [],
  stats: { total:0, upgrades:0, byRarity:{Common:0,Uncommon:0,Rare:0,Epic:0,Legendary:0} },
  customProb: null, // override probabilities
};

function wavesInChapter(ch) { return ch <= 5 ? 30 + (ch-1)*15 : 90; }
function totalBosses(ch) { return wavesInChapter(ch) / 5; }
function isFinalBoss(ch, idx) { return idx === totalBosses(ch)-1; }

// ═══════════════════════════════════════════════════════
//  SIMULATION CORE
// ═══════════════════════════════════════════════════════
// Final boss guaranteed minimum per chapter group:
// Ch 1-3 → min Uncommon | Ch 4-9 → min Uncommon (Rare possible)
// Ch 10-15 → min Rare   | Ch 16-24 → min Rare (Epic/Leg boosted)
const FINAL_BOSS_MIN = [1,1,1,2,2,2,2,2]; // index into RARITIES (0=C,1=U,2=R,3=E,4=L)

function rollRarity(ch, isFinal) {
  const probs = state.customProb ? state.customProb[probGroup(ch)] : DEFAULT_PROB[probGroup(ch)];
  let p = [...probs];

  if (isFinal) {
    const minIdx = FINAL_BOSS_MIN[probGroup(ch)];
    // Redistribute all probability below minIdx into minIdx
    let pooled = 0;
    for (let i = 0; i < minIdx; i++) { pooled += p[i]; p[i] = 0; }
    p[minIdx] += pooled;
    // Extra boost: add 15% weight to minIdx and above, normalized
    // (makes final boss feel meaningfully different)
    const s = p.reduce((a,b)=>a+b,0);
    p = p.map(x => x/s*100);
  }

  const r = Math.random()*100;
  let acc = 0;
  for (let i=0; i<5; i++) {
    acc += p[i];
    if (r < acc) return RARITIES[i];
  }
  return RARITIES[4];
}

function rollSlot() {
  // Ưu tiên slot trống → đảm bảo full 8 trang bị trong 2 chapter đầu
  const emptySlots = SLOTS.filter(sl => !state.gear[sl.id]);
  const pool = emptySlots.length > 0 ? emptySlots : SLOTS;
  return pool[Math.floor(Math.random() * pool.length)];
}

function doMobDrop() {
  if (state.mobDropDone) return;
  if (state.bossIdx >= totalBosses(state.chapter)) return;

  const ch = state.chapter;
  const slot = rollSlot();
  // Mob drop: dùng drop rate bình thường nhưng cap tại Rare
  const probs = state.customProb ? state.customProb[probGroup(ch)] : DEFAULT_PROB[probGroup(ch)];
  let p = [...probs];
  // Dồn Epic + Legendary vào Rare
  p[2] += p[3] + p[4]; p[3] = 0; p[4] = 0;
  const r = Math.random() * 100;
  let acc = 0, rarity = 'Common';
  for (let i = 0; i < 3; i++) { acc += p[i]; if (r < acc) { rarity = RARITIES[i]; break; } }
  rarity = capRarity(rarity, ch);

  const item = pickItem(slot.id, ch);
  const score = calcScore(item, rarity);
  const current = state.gear[slot.id];
  const isNew = !current;
  const isSameItemHigherRarity = !isNew && item.idx === current.itemIdx && RARITIES.indexOf(rarity) > RARITIES.indexOf(current.rarity);
  const isUpgrade = isNew || score > current.score || isSameItemHigherRarity;

  if (isUpgrade) {
    state.gear[slot.id] = { name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score, chapter: ch };
    if (!isNew) state.stats.upgrades++;
    if (isNew) { state.pityCount = 0; }
    else state.pityCount = 0;
  } else {
    state.pityCount++;
  }
  state.stats.total++;
  state.stats.byRarity[rarity]++;

  const entry = {
    ch, boss: state.bossIdx + 1, isFinal: false, isMobDrop: true,
    slot, name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score,
    isUpgrade, isNew, prevScore: current ? current.score : null, prevName: current ? current.name : null, prevRarity: current ? current.rarity : null, prevItemIdx: current ? current.itemIdx : null
  };
  state.log.unshift(entry);
  if (state.log.length > 200) state.log.pop();
  state.mobDropDone = true;
  render();
}


function doBoss() {
  const ch = state.chapter;
  const bosses = totalBosses(ch);
  if (state.bossIdx >= bosses) return;

  const isFinal = isFinalBoss(ch, state.bossIdx);
  const slot = rollSlot();
  let rarity = capRarity(rollRarity(ch, isFinal), ch);

  // Pity system: 3 consecutive no-upgrades → guaranteed Rare+ (capped by chapter)
  if (state.pityCount >= 3 && RARITIES.indexOf(rarity) < 2) {
    rarity = capRarity('Rare', ch);
  }

  let item = pickItem(slot.id, ch);
  let score = calcScore(item, rarity);
  const current = state.gear[slot.id];
  const isNew = !current;


  // Hướng C: Boss cuối chapter → guaranteed upgrade (capped theo max rarity của chapter)
  if (isFinal && !isNew) {
    const curScore = current.score;
    const chProbs = state.customProb ? state.customProb[probGroup(ch)] : DEFAULT_PROB[probGroup(ch)];
    const maxRarityIdx = chProbs.reduce((max, p, i) => p > 0 ? i : max, 0);
    // Thử bump rarity lên nhưng không vượt quá max rarity của chapter
    if (score <= curScore) {
      for (let ri = RARITIES.indexOf(rarity) + 1; ri <= maxRarityIdx; ri++) {
        const tryScore = calcScore(item, RARITIES[ri]);
        if (tryScore > curScore) { rarity = RARITIES[ri]; score = tryScore; break; }
      }
    }
    // Nếu vẫn không đủ → thử item mạnh nhất trong chapter pool (vẫn giới hạn max rarity)
    if (score <= curScore) {
      const pool = CH_ITEMS[slot.id][ch] || [];
      for (const candidate of pool) {
        for (let ri = maxRarityIdx; ri >= 0; ri--) {
          const tryScore = calcScore(candidate, RARITIES[ri]);
          if (tryScore > curScore) { item = candidate; rarity = RARITIES[ri]; score = tryScore; break; }
        }
        if (score > curScore) break;
      }
    }
  }

  state.bossIdx++;
  state.mobDropDone = false; // reset cho cycle tiếp theo
  state.stats.total++;
  state.stats.byRarity[rarity]++;

  if (isNew) {
    // No existing gear → auto equip
    state.gear[slot.id] = { name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score, chapter: ch };
    state.pityCount = 0;
    const entry = { ch, boss: state.bossIdx, isFinal, slot, name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score, isUpgrade: true, isNew: true, prevScore: null, prevName: null, prevRarity: null, prevItemIdx: null };
    state.log.unshift(entry);
    if (state.log.length > 200) state.log.pop();
    render();
  } else {
    const isSameItemHigherRarity = item.idx === current.itemIdx && RARITIES.indexOf(rarity) > RARITIES.indexOf(current.rarity);
    const isUpgrade = score > current.score || isSameItemHigherRarity;
    if (isUpgrade) {
      state.gear[slot.id] = { name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score, chapter: ch };
      state.pityCount = 0;
      state.stats.upgrades++;
    } else {
      state.pityCount++;
    }
    const entry = { ch, boss: state.bossIdx, isFinal, slot, name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score, isUpgrade, isNew: false, prevScore: current.score, prevName: current.name, prevRarity: current.rarity, prevItemIdx: current.itemIdx };
    state.log.unshift(entry);
    if (state.log.length > 200) state.log.pop();
    render();
  }
}

function doMobDropAuto() {
  if (state.mobDropDone) return;
  if (state.bossIdx >= totalBosses(state.chapter)) return;
  const ch = state.chapter;
  const slot = rollSlot();
  const probs = DEFAULT_PROB[probGroup(ch)];
  let p = [...probs]; p[2] += p[3] + p[4]; p[3] = 0; p[4] = 0;
  const r = Math.random()*100; let acc=0, rarity='Common';
  for(let i=0;i<3;i++){acc+=p[i];if(r<acc){rarity=RARITIES[i];break;}}
  rarity=capRarity(rarity,ch);
  const item=pickItem(slot.id,ch);
  const score=calcScore(item,rarity);
  const current=state.gear[slot.id];
  const isNew=!current, isSameItemHigherRarity2=!isNew&&item.idx===current.itemIdx&&RARITIES.indexOf(rarity)>RARITIES.indexOf(current.rarity), isUpgrade=isNew||score>current.score||isSameItemHigherRarity2;
  if(isUpgrade){state.gear[slot.id]={name:item.name,itemId:item.id,itemIdx:item.idx,rarity,score,chapter:ch};state.pityCount=0;if(!isNew)state.stats.upgrades++;}else{state.pityCount++;}
  state.stats.total++;state.stats.byRarity[rarity]++;
  const entry={ch,boss:state.bossIdx+1,isFinal:false,isMobDrop:true,slot,name:item.name,itemId:item.id,itemIdx:item.idx,rarity,score,isUpgrade,isNew,prevScore:current?current.score:null,prevName:current?current.name:null,prevRarity:current?current.rarity:null,prevItemIdx:current?current.itemIdx:null};
  state.log.unshift(entry);if(state.log.length>200)state.log.pop();
  state.mobDropDone=true;
}

function doBossAuto() {
  // Auto version for bulk simulation — no modal, score-based decision
  const ch = state.chapter;
  const bosses = totalBosses(ch);
  if (state.bossIdx >= bosses) return;

  const isFinal = isFinalBoss(ch, state.bossIdx);
  const slot = rollSlot();
  let rarity = capRarity(rollRarity(ch, isFinal), ch);
  if (state.pityCount >= 3 && RARITIES.indexOf(rarity) < 2) rarity = capRarity('Rare', ch);
  const item = pickItem(slot.id, ch);
  const score = calcScore(item, rarity);
  const current = state.gear[slot.id];
  const isNew = !current;
  const isSameItemHigherRarity3 = !isNew && item.idx === current.itemIdx && RARITIES.indexOf(rarity) > RARITIES.indexOf(current.rarity);
  const isUpgrade = isNew || score > current.score || isSameItemHigherRarity3;

  if (isUpgrade) {
    state.gear[slot.id] = { name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score, chapter: ch };
    state.pityCount = 0;
  } else {
    state.pityCount++;
  }
  state.bossIdx++;
  state.mobDropDone = false; // reset cho cycle tiếp theo
  state.stats.total++;
  state.stats.byRarity[rarity]++;
  if (isUpgrade) state.stats.upgrades++;
  const entry = { ch, boss: state.bossIdx, isFinal, slot, name: item.name, itemId: item.id, itemIdx: item.idx, rarity, score, isUpgrade, isNew, prevScore: current ? current.score : null, prevName: current ? current.name : null, prevRarity: current ? current.rarity : null, prevItemIdx: current ? current.itemIdx : null };
  state.log.unshift(entry);
  if (state.log.length > 200) state.log.pop();
}

function runAll() {
  const ch = state.chapter;
  const bosses = totalBosses(ch);
  while (state.bossIdx < bosses) { doMobDropAuto(); doBossAuto(); }
  render();
}

function bulkSim() {
  const n = parseInt(document.getElementById('simCount').value) || 100;
  for (let i=0; i<n; i++) {
    if (state.bossIdx >= totalBosses(state.chapter)) {
      if (state.chapter < 24) { state.chapter++; state.bossIdx = 0; }
      else break;
    }
    doMobDropAuto();
    doBossAuto();
  }
  render();
}

function resetChapter() {
  state.bossIdx = 0;
  state.mobDropDone = false;
  // pityCount KHÔNG reset khi qua chapter — giữ nguyên xuyên suốt
  render();
}

function resetAll() {
  const startWeapon = ITEM_POOLS['weapon'][0]; // Nerf Ball Gun I
  state = {
    chapter:1, bossIdx:0,
    gear: {
      weapon: {
        name: startWeapon.name,
        itemId: startWeapon.id,
        itemIdx: startWeapon.idx,
        rarity: 'Common',
        score: startWeapon.baseScore * SCORE_MULT['Common'],
        chapter: 1,
      }
    },
    pityCount:0, mobDropDone:false, log:[],
    stats:{total:0,upgrades:0,byRarity:{Common:0,Uncommon:0,Rare:0,Epic:0,Legendary:0}},
    customProb: state.customProb,
  };
  render();
}

function chChange(d) {
  state.chapter = Math.max(1, Math.min(24, state.chapter+d));
  state.bossIdx = 0;
  // pityCount KHÔNG reset khi đổi chapter
  document.getElementById('chSlider').value = state.chapter;
  render();
}
function chSet(v) {
  state.chapter = parseInt(v);
  state.bossIdx = 0;
  // pityCount KHÔNG reset khi kéo slider chapter
  render();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(2)+'K';
  // Hiển thị đúng số thực, bỏ số 0 thừa ở cuối
  return parseFloat(n.toFixed(2)).toString();
}

function rarityBadge(r) {
  return `<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:${RARITY_COLOR[r]}22;color:${RARITY_COLOR[r]};border:1px solid ${RARITY_COLOR[r]}44">${r}</span>`;
}

function render() {
  const ch = state.chapter;
  const bosses = totalBosses(ch);

  document.getElementById('chVal').textContent = ch;
  document.getElementById('chSlider').value = ch;

  // Chapter info
  const waves = wavesInChapter(ch);
  // Items available in this chapter for first slot (weapon) as sample
  const sampleItems = CH_ITEMS['weapon'][ch] || [];
  const scoreRange = sampleItems.length
    ? `${fmt(sampleItems[0].scoresMap?.Common || sampleItems[0].baseScore)}–${fmt(sampleItems[sampleItems.length-1].scoresMap?.Legendary || sampleItems[sampleItems.length-1].baseScore * 3.20)}`
    : '–'; // Common min → Legendary max
  document.getElementById('chInfo').innerHTML = `
    <div class="ch-stat"><span>Waves:</span><span>${waves}</span></div>
    <div class="ch-stat"><span>Boss:</span><span>${bosses} (mỗi 5 wave)</span></div>
    <div class="ch-stat"><span>Items/slot ch.này:</span><span>${sampleItems.length}</span></div>
    <div class="ch-stat"><span>Score range (C→L):</span><span>${scoreRange}</span></div>
    <div class="ch-stat"><span>Boss hiện tại:</span><span>${state.bossIdx}/${bosses}</span></div>
    <div class="ch-stat"><span>Slot đã có gear:</span><span style="color:${Object.keys(state.gear).length===8?'#34d399':'#f59e0b'}">${Object.keys(state.gear).length}/8 ${Object.keys(state.gear).length===8?'✓ Full':'⚡ Ưu tiên trống'}</span></div>
  `;

  // Wave visual
  const wv = document.getElementById('waveVis');
  wv.innerHTML = '';
  for (let i=1; i<=bosses; i++) {
    const d = document.createElement('div');
    const isFinal = i===bosses;
    const isDone = i <= state.bossIdx;
    const isCurrent = i === state.bossIdx+1;
    d.className = `wave-dot ${isFinal?'wave-boss-final':'wave-boss'} ${isDone?'wave-done':''} ${isCurrent?'wave-current':''}`;
    d.textContent = isFinal ? '★' : '■';
    d.title = `Boss wave ${i*5}`;
    wv.appendChild(d);
  }

  // Pity
  const pct = Math.min(state.pityCount/5*100,100);
  document.getElementById('pityFill').style.width = pct+'%';
  document.getElementById('pityTxt').textContent = state.pityCount >= 5 ? '⚡ PITY!' : `${state.pityCount}/5`;

  // Boss button
  const done = state.bossIdx >= bosses;
  const btn = document.getElementById('bossBtn');
  btn.className = 'boss-btn' + ((done || !state.mobDropDone)?' disabled':'');
  btn.disabled = done || !state.mobDropDone;
  if (!done) {
    const nextIsFinal = isFinalBoss(ch, state.bossIdx);
    btn.textContent = nextIsFinal ? '★ BOSS CUỐI CHAPTER' : `👹 BOSS #${state.bossIdx+1} (Wave ${(state.bossIdx+1)*5})`;
  } else {
    btn.textContent = '✓ Chapter hoàn thành';
  }
  const mobBtn = document.getElementById('mobBtn');
  if (mobBtn) {
    const mobDone = state.mobDropDone || done;
    mobBtn.disabled = mobDone;
    mobBtn.className = 'boss-btn' + (mobDone?' disabled':'');
    mobBtn.style.background = mobDone ? '' : 'linear-gradient(135deg,#1e3a2f,#14532d)';
    mobBtn.textContent = done ? '✓ Chapter hoàn thành' : state.mobDropDone ? `✓ Mob drop xong (${state.bossIdx+1}/${bosses})` : `⚔️ MOB WAVE ${state.bossIdx*5+1}–${state.bossIdx*5+3}`;
  }

  // Gear grid
  const gg = document.getElementById('gearGrid');
  gg.innerHTML = '';
  SLOTS.forEach(sl => {
    const g = state.gear[sl.id];
    const div = document.createElement('div');
    div.className = `gear-slot ${g ? RARITY_BG[g.rarity] : 'bg-common'}`;
    div.style.border = g ? '' : '1px solid #2a2a44';
    if (g) {
      div.innerHTML = `
        <div class="gear-slot-name">${sl.icon} ${sl.vi}</div>
        ${rarityBadge(g.rarity)}
        <div class="gear-item-name" style="color:${RARITY_COLOR[g.rarity]}">${g.name} <span style="font-size:9px;color:#a78bfa;font-weight:600">Lv.${ITEM_LEVELS[sl.id]?.[g.itemIdx]||'?'}</span></div>
        <div class="gear-score">${fmt(g.score)} pts · Ch${g.chapter}</div>
      `;
    } else {
      div.innerHTML = `<div class="gear-slot-name">${sl.icon} ${sl.vi}</div><div class="gear-empty">Chưa có trang bị</div>`;
    }
    gg.appendChild(div);
  });

  // Drop log
  const dl = document.getElementById('dropList');
  dl.innerHTML = '';
  document.getElementById('logCount').textContent = `${state.log.length} drops`;
  state.log.slice(0,50).forEach((e,idx) => {
    const div = document.createElement('div');
    div.className = `drop-card ${RARITY_BG[e.rarity]} ${idx===0?'new-drop':''}`;
    const badge = e.isNew
      ? `<span class="drop-badge badge-new">Mới</span>`
      : e.isUpgrade
        ? `<span class="drop-badge badge-upgrade">↑ Upgrade</span>`
        : `<span class="drop-badge badge-sell">Bán</span>`;
    const prevLv = e.prevItemIdx != null ? (ITEM_LEVELS[e.slot.id]?.[e.prevItemIdx] || '?') : '?';
    const prevTxt = e.prevScore != null
      ? `<div style="font-size:9px;color:#6b7280;margin-top:1px">cũ: <span style="color:${RARITY_COLOR[e.prevRarity]||'#9ca3af'}">${e.prevName||''}</span> <span style="font-size:8px;color:#a78bfa;font-weight:600">Lv.${prevLv}</span> <span style="color:#6b7280">${fmt(e.prevScore)}</span></div>`
      : '';
    div.innerHTML = `
      <div style="font-size:16px">${e.slot.icon}</div>
      <div class="drop-card-info">
        <div class="drop-card-name" style="color:${RARITY_COLOR[e.rarity]}">${e.name} <span style="font-size:9px;color:#a78bfa;font-weight:600">Lv.${ITEM_LEVELS[e.slot.id]?.[e.itemIdx]||'?'}</span> ${rarityBadge(e.rarity)}</div>
        <div class="drop-card-sub">${e.slot.vi} · #${String(e.itemIdx+1).padStart(2,'0')} · Ch${e.ch} ${e.isMobDrop?'Wave'+(e.boss*5-2)+'-'+(e.boss*5-2+2):'Boss#'+e.boss}${e.isFinal?' ★':''}</div>
      </div>
      <div style="text-align:right">
        <div class="drop-card-score" style="color:${RARITY_COLOR[e.rarity]}">${fmt(e.score)}</div>
        ${prevTxt}
        <div style="margin-top:3px">${badge}</div>
      </div>
    `;
    dl.appendChild(div);
  });

  // Stats
  renderStats();
  renderItemDB();
}

function renderStats() {
  const s = state.stats;
  const total = s.total;
  const upPct = total ? (s.upgrades/total*100).toFixed(1) : '0.0';
  const gear = Object.values(state.gear);
  const gearSlots = gear.length;
  let html = `
    <div class="stat-row"><span>Tổng drops</span><span class="stat-val">${total}</span></div>
    <div class="stat-row"><span>Upgrade rate</span><span class="stat-val">${upPct}%</span></div>
    <div class="stat-row"><span>Slots có gear</span><span class="stat-val">${gearSlots}/8</span></div>
    <div class="stat-row"><span>Pity hiện tại</span><span class="stat-val">${state.pityCount}/5</span></div>
    <div class="section-label" style="margin-top:10px">Rarity distribution</div>
  `;
  const segs = RARITIES.map(r => {
    const pct = total ? s.byRarity[r]/total*100 : 0;
    return `<div class="rarity-seg" style="width:${pct}%;background:${RARITY_COLOR[r]};min-width:${pct>0?'6px':'0'}" title="${r}: ${pct.toFixed(1)}%">${pct>=8?Math.round(pct)+'%':''}</div>`;
  }).join('');
  html += `<div class="rarity-bar">${segs}</div>`;
  RARITIES.forEach(r => {
    const n = s.byRarity[r];
    const pct = total ? (n/total*100).toFixed(1) : '0.0';
    html += `<div class="stat-row"><span style="color:${RARITY_COLOR[r]}">${r}</span><span class="stat-val">${n} (${pct}%)</span></div>`;
  });
  document.getElementById('statsContent').innerHTML = html;
}

function renderItemDB() {
  const filter = document.getElementById('slotFilter').value;
  let html = '';
  const slotsToShow = filter === 'all' ? SLOTS : SLOTS.filter(sl => sl.id === filter);
  slotsToShow.forEach(sl => {
    html += `<div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin:8px 0 4px">${sl.icon} ${sl.vi} (66 items)</div>`;
    let lastCh = 0;
    ITEM_POOLS[sl.id].forEach(item => {
      if (item.chapter !== lastCh) {
        html += `<div style="font-size:10px;color:#4b5563;margin:4px 0 2px;padding-left:2px">Chapter ${item.chapter}</div>`;
        lastCh = item.chapter;
      }
      const equipped = state.gear[sl.id] && state.gear[sl.id].itemId === item.id;
      html += `<div style="display:flex;justify-content:space-between;padding:2px 6px;border-radius:4px;background:${equipped?'#1e3a5f':'#1e1e36'};margin-bottom:1px;font-size:11px;${equipped?'border:1px solid #60a5fa':''}">
        <span><span style="color:#4b5563;font-size:10px">#${String(item.idx+1).padStart(2,'0')}</span> ${item.name}</span>
        <span style="color:#a78bfa">${fmt(item.scoresMap?.Common || item.baseScore)}</span>
      </div>`;
    });
  });
  document.getElementById('itemDB').innerHTML = html;
}

// Prob editor
function buildProbEditor() {
  const probs = state.customProb || DEFAULT_PROB;
  const groups = ['Ch 1–3','Ch 4–6','Ch 7–9','Ch 10–12','Ch 13–15','Ch 16–18','Ch 19–21','Ch 22–24'];
  let html = '';
  groups.forEach((g,gi) => {
    html += `<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:4px">${g}</div>`;
    html += `<div class="prob-editor">`;
    RARITIES.forEach((r,ri) => {
      html += `<div class="prob-field">
        <label style="color:${RARITY_COLOR[r]}">${r}</label>
        <input type="number" id="prob_${gi}_${ri}" value="${probs[gi][ri]}" min="0" max="100" step="1">
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('probEditor').innerHTML = html;
}

function applyProb() {
  const p = [];
  for (let gi=0; gi<8; gi++) {
    const row = [];
    let sum = 0;
    for (let ri=0; ri<5; ri++) {
      const v = parseFloat(document.getElementById(`prob_${gi}_${ri}`).value)||0;
      row.push(v); sum+=v;
    }
    if (Math.abs(sum-100) > 0.5) {
      alert(`Nhóm ${gi+1}: tổng phải = 100%! (hiện tại: ${sum.toFixed(1)})`);
      return;
    }
    p.push(row);
  }
  state.customProb = p;
  DROP_RATES = p;
  localStorage.setItem('natv_customProb', JSON.stringify(p));
  document.getElementById('probErr').textContent = '';
  alert('Đã áp dụng drop rates mới!');
}

function resetProb() {
  state.customProb = null;
  localStorage.removeItem('natv_customProb');
  buildProbEditor();
  alert('Đã về drop rates mặc định!');
}

function clearLog() {
  state.log = [];
  state.stats = { total:0, upgrades:0, byRarity:{Common:0,Uncommon:0,Rare:0,Epic:0,Legendary:0} };
  render();
}

function setTab(tab, el) {
  ['log','stats','rarity','prob'].forEach(t => {
    const panel = document.getElementById('tab-'+t);
    if (panel) panel.style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  if (tab === 'rarity') renderRarityList();
  if (tab === 'prob') buildProbEditor();
  if (tab === 'stats') renderStats();
}

function renderRarityList() {
  const slotF = document.getElementById('raritySlotFilter').value;
  const rarF = document.getElementById('rarityFilter').value;
  const slotsToShow = slotF === 'all' ? SLOTS : SLOTS.filter(sl => sl.id === slotF);
  let html = '';
  slotsToShow.forEach(sl => {
    html += `<div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin:8px 0 4px">${sl.icon} ${sl.vi}</div>`;
    let lastCh = 0;
    ITEM_POOLS[sl.id].forEach(item => {
      const raritiesToShow = rarF === 'all' ? RARITIES : [rarF];
      const rows = raritiesToShow.map(r => {
        const sc = calcScore(item, r);
        return `<span style="color:${RARITY_COLOR[r]};font-size:10px;margin-right:6px">${r[0]}: ${fmt(sc)}</span>`;
      }).join('');
      if (item.chapter !== lastCh) {
        html += `<div style="font-size:10px;color:#4b5563;margin:4px 0 2px;padding-left:2px">Chapter ${item.chapter}</div>`;
        lastCh = item.chapter;
      }
      html += `<div style="padding:2px 6px;border-radius:4px;background:#1e1e36;margin-bottom:1px;font-size:11px;display:flex;justify-content:space-between">
        <span><span style="color:#4b5563;font-size:10px">#${String(item.idx+1).padStart(2,'0')}</span> ${item.name}</span>
        <span>${rows}</span>
      </div>`;
    });
  });
  document.getElementById('rarityListContent').innerHTML = html || '<div style="color:#6b7280;font-size:11px">Không có dữ liệu</div>';
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
// Populate slot filters
['slotFilter','raritySlotFilter'].forEach(id => {
  const sel = document.getElementById(id);
  if (!sel) return;
  SLOTS.forEach(sl => {
    const opt = document.createElement('option');
    opt.value = sl.id;
    opt.textContent = sl.icon + ' ' + sl.vi;
    sel.appendChild(opt);
  });
});

resetAll();
// Khôi phục customProb từ localStorage nếu có
try {
  const saved = localStorage.getItem('natv_customProb');
  if (saved) {
    state.customProb = JSON.parse(saved);
    DROP_RATES = state.customProb;
  }
} catch(e) {}
buildProbEditor();
render();
